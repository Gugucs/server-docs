  <path d="M 507 158 C 522 170 538 182 548 187" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 507 162 C 522 192 538 212 548 219" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-orange)"/>

